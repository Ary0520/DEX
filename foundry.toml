[profile.default]
src = "src"
out = "out"
libs = ["lib"]
remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "@chainlink/=lib/chainlink-brownie-contracts/"
]
optimizer = true
optimizer_runs = 200
via_ir = true

[fuzz]
runs = 2000

[invariant]
runs = 256
depth = 500
# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
